[pytest]
testpaths     = tests
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# Default timeout for each test (seconds)
timeout = 30

# Show slowest 10 tests
addopts =
    -v
    --tb=short
    --strict-markers
    --durations=10

# Coverage settings (used when --cov is passed)
[coverage:run]
source = app
omit =
    app/gui.py          # Kivy GUI — not testable headlessly
    tests/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == .__main__.:
    pass
show_missing = true